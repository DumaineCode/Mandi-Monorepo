# SDD / OpenSpec project configuration
# Generated by sdd-init — safe to edit; re-init will not destructively rewrite this file.

project:
  name: mandi-oficial
  description: pnpm/turbo monorepo — Medusa 2.15.x commerce backend + Next.js storefront
  language: typescript
  package_manager: pnpm
  monorepo: true
  workspaces:
    - path: apps/backend
      package: "@dtc/backend"
      stack: "Medusa 2.15.x (Node.js commerce backend)"
    - path: apps/storefront
      package: "@dtc/storefront"
      stack: "Next.js"

context:
  custom_modules:
    - name: openpay-payment
      path: apps/backend/src/modules/openpay-payment
      notes: env-gated registration in apps/backend/medusa-config.ts
    - name: skydropx-fulfillment
      path: apps/backend/src/modules/skydropx-fulfillment
      notes: env-gated registration in apps/backend/medusa-config.ts
  payment_providers:
    - Mercado Pago
    - Openpay
  runbooks:
    - docs/runbooks/mx-payments-shipping.md
  architecture_skill: .agents/skills/building-with-medusa/SKILL.md
  conventions:
    artifact_language: english
    medusa_rules:
      - "Mutations go through workflows; never call module services directly from routes"
      - "HTTP methods limited to GET/POST/DELETE"
      - "Prices stored as-is (49.99 = 49.99, never cents)"
      - "Cross-module reads via query.graph(); cross-module filtering via query.index()"
      - "Module names camelCase; run build after implementation"

testing:
  strict_tdd: true
  runner: jest
  unit:
    command: "cd apps/backend && pnpm test:unit"
    status: green
  integration:
    - command: "cd apps/backend && pnpm test:integration:http"
    - command: "cd apps/backend && pnpm test:integration:modules"
  notes: >
    Strict TDD applies to apps/backend unit tests. Integration suites are
    heavier (runInBand, forceExit) — run them at verify time, not per-cycle.

sdd:
  artifact_store: openspec
  execution_mode: interactive
  delivery_strategy: auto-chain
  review_budget_changed_lines_per_pr: 600
  phases:
    proposal: required
    spec: required
    design: required
    tasks: required
    apply: strict_tdd
    verify: required
    archive: required
