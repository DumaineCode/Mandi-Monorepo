name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend (tests + build)
    runs-on: ubuntu-latest

    # Postgres service for the integration suites (module + http). Both boot a
    # real Medusa app / module against this DB; unit tests do not need it but
    # the shared job env is harmless for them and the build step.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: medusa_test
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before any step runs.
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # The integration test runners create/drop throwaway databases off this
      # connection, so the user must be able to CREATE DATABASE (postgres is).
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/medusa_test
      # Medusa forces NODE_ENV=test in the integration runners; medusa-config.ts
      # only enables Postgres SSL outside development/test, so this local,
      # non-SSL service connects cleanly.
      NODE_ENV: test
      # Deterministic test KEK (mirrors integration-tests/setup.js) so the
      # provider-settings module boots with encryption enabled.
      PROVIDER_SETTINGS_ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
      JWT_SECRET: test-jwt-secret
      COOKIE_SECRET: test-cookie-secret
      STORE_CORS: http://localhost:8000
      ADMIN_CORS: http://localhost:9000
      AUTH_CORS: http://localhost:9000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Focused-test guard (no .only / fit / fdescribe)
        run: |
          if grep -rnE "\.(only)\(|fit\(|fdescribe\(" apps/backend/src apps/backend/integration-tests --include="*.spec.ts"; then
            echo "::error::Focused tests found (.only/fit/fdescribe). Remove them before merging — they silently skip the rest of the suite."
            exit 1
          fi
          echo "No focused tests found."

      - name: Unit tests
        working-directory: apps/backend
        run: pnpm test:unit

      - name: Module integration tests
        working-directory: apps/backend
        run: pnpm test:integration:modules

      - name: HTTP integration tests
        working-directory: apps/backend
        run: pnpm test:integration:http

      - name: Build
        working-directory: apps/backend
        run: pnpm build

  storefront:
    name: Storefront (compile check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The compile step is the gate. Page-data collection needs a live Medusa
      # backend, so a post-compile fetch failure is soft-passed with a warning.
      - name: Build (compile is the gate; page-data may need a live backend)
        working-directory: apps/storefront
        run: |
          set -o pipefail
          if pnpm build 2>&1 | tee build.log; then
            exit 0
          fi
          if grep -q "Compiled successfully" build.log; then
            echo "::warning::Next.js compiled successfully but page-data collection failed (needs a live backend) — soft pass."
            exit 0
          fi
          echo "::error::Storefront compile failed."
          exit 1
